# 迭代 8：Nginx 反向代理 + HTTPS + gzip + 静态资源缓存
#
# 上游：
#   - frontend:80（Vue dist 容器）
#   - backend:8000（FastAPI）

upstream medshare_frontend {
    server frontend:80;
}

upstream medshare_backend {
    server backend:8000;
}

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name _;

    # 健康检查走 HTTP，避免证书耦合
    location = /health {
        return 200 "ok";
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # gzip（静态资源 + JSON API）
    gzip on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_vary on;

    client_max_body_size 20m;

    # 前端静态资源
    location / {
        proxy_pass http://medshare_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 静态资源加强缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://medshare_frontend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 后端 API
    location /api/ {
        proxy_pass http://medshare_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # 后端 WebSocket
    location /ws/ {
        proxy_pass http://medshare_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Prometheus / readiness
    location = /metrics {
        # 仅内网抓取；生产可加 allow/deny
        proxy_pass http://medshare_backend/metrics;
    }

    location /health {
        proxy_pass http://medshare_backend/health;
    }
}
